<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support & Feedback | Twitch Emote Resizer</title>
    <meta name="description" content="Have a feature request or need help resizing your emotes? Reach out to the EMOTE.PRO team. We're here to help you perfect your stream assets.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6843236661208561"
     crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/src/index.css">
</head>
<body class="overflow-x-hidden flex flex-col min-h-screen bg-gray-50">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 w-full h-16 z-50 flex items-center justify-between px-6 border-b border-gray-200 glass-blur">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-twitch rounded-md flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57V4.714zm4.715 0H18v5.143h-1.714V4.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0H6zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714v9.429z"/></svg>
            </div>
            <a href="index.html" class="text-sm font-bold tracking-tight">Twitch Emote Resizer</a>
        </div>
        <div class="flex items-center gap-6 text-xs font-medium text-gray-500 uppercase tracking-wider">
            <a href="about.html" class="hover:text-twitch transition-colors">Mission</a>
            <a href="contact.html" class="text-twitch">Support</a>
        </div>
    </nav>

    <main class="flex-1 pt-40 px-8 lg:px-24 pb-24">
        <div class="max-w-4xl">
            <span class="text-[10px] font-bold uppercase tracking-[0.5em] text-twitch mb-12 block">Support Pipeline</span>
            <h1 class="text-4xl md:text-6xl font-bold tracking-tight text-gray-900 mb-24">
                Get in<br>
                <span class="font-serif italic font-normal lowercase text-twitch">Touch.</span>
            </h1>

            <form class="space-y-12" onsubmit="event.preventDefault(); alert('Transmission Received.');">
                <div class="grid md:grid-cols-2 gap-12">
                    <div class="border-b border-gray-200 py-4">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Identity</label>
                        <input type="text" required class="w-full bg-transparent text-xl font-light outline-none text-gray-900" placeholder="NAME">
                    </div>
                    <div class="border-b border-gray-200 py-4">
                        <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Return_Path</label>
                        <input type="email" required class="w-full bg-transparent text-xl font-light outline-none text-gray-900" placeholder="EMAIL">
                    </div>
                </div>
                <div class="border-b border-gray-200 py-4">
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Payload</label>
                    <textarea required rows="4" class="w-full bg-transparent text-xl font-light outline-none resize-none text-gray-900" placeholder="MESSAGE"></textarea>
                </div>
                <button type="submit" class="group flex items-center gap-4 text-sm font-bold uppercase tracking-[0.4em] text-twitch hover:text-twitch-hover transition-colors">
                    Execute Transmission
                    <div class="w-8 h-[2px] bg-twitch group-hover:w-16 transition-all"></div>
                </button>
            </form>
        </div>
    </main>

    <footer class="p-8 lg:p-16 border-t border-gray-100 bg-gray-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8 text-[10px] font-bold uppercase tracking-widest text-gray-400">
            <span>&copy; 2026 EMOTE.PRO</span>
            <div class="flex gap-8">
                <a href="index.html" class="hover:text-twitch transition-colors">Home</a>
                <a href="privacy-policy.html" class="hover:text-twitch transition-colors">Privacy</a>
                <a href="terms.html" class="hover:text-twitch transition-colors">Terms</a>
            </div>
        </div>
    </footer>

    <!-- Cookie Consent Banner -->
    <div id="cookie-banner" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 z-[100] transform translate-y-full transition-transform duration-500 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <p class="text-sm text-gray-600">
                We use cookies to enhance your experience and analyze our traffic. By clicking "Accept", you consent to our use of cookies. 
                <a href="privacy-policy.html" class="text-twitch underline">Learn more</a>.
            </p>
            <div class="flex gap-4">
                <button id="accept-cookies" class="px-6 py-2 bg-twitch text-white text-xs font-bold uppercase tracking-widest rounded hover:bg-twitch-hover transition-colors">Accept</button>
                <button id="decline-cookies" class="px-6 py-2 text-gray-400 text-xs font-bold uppercase tracking-widest hover:text-gray-600 transition-colors">Decline</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const banner = document.getElementById('cookie-banner');
            const acceptBtn = document.getElementById('accept-cookies');
            const declineBtn = document.getElementById('decline-cookies');

            if (!localStorage.getItem('cookieConsent')) {
                setTimeout(() => {
                    banner.classList.remove('translate-y-full');
                }, 1000);
            }

            acceptBtn.addEventListener('click', () => {
                localStorage.setItem('cookieConsent', 'accepted');
                banner.classList.add('translate-y-full');
            });

            declineBtn.addEventListener('click', () => {
                localStorage.setItem('cookieConsent', 'declined');
                banner.classList.add('translate-y-full');
            });
        });
    </script>
</body>
</html>
